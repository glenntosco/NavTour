<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NavTour Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1 class="logo">NavTour</h1>

    <!-- Not Logged In Screen -->
    <div id="screen-not-logged-in" class="screen">
      <div class="not-logged-in-message">
        <p class="not-logged-in-title">Not logged in</p>
        <p class="not-logged-in-desc">Log into the NavTour web app first, then come back here.</p>
      </div>
      <a id="btn-open-app" class="btn btn-primary btn-open-app" href="#" target="_blank" rel="noopener">Log in at navtour.cloud</a>
      <button id="btn-retry" class="btn btn-secondary">Retry</button>
      <div id="retry-status" class="status" hidden></div>
    </div>

    <!-- Demo Select Screen -->
    <div id="screen-select" class="screen" hidden>
      <div class="field">
        <label for="demo-select">Select Demo</label>
        <select id="demo-select">
          <option value="">— Choose a demo —</option>
        </select>
      </div>
      <div class="divider">or</div>
      <div class="field">
        <label for="new-demo-name">Create New Demo</label>
        <input type="text" id="new-demo-name" placeholder="My Product Demo">
      </div>
      <div class="field">
        <label>Capture Mode</label>
        <div class="mode-group">
          <label class="mode-option">
            <input type="radio" name="capture-mode" value="auto" checked>
            <span class="mode-label">Auto</span>
            <span class="mode-desc">Captures on navigation</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="capture-mode" value="click">
            <span class="mode-label">Click-to-Capture</span>
            <span class="mode-desc">Captures on every click</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="capture-mode" value="manual">
            <span class="mode-label">Manual</span>
            <span class="mode-desc">Capture button or Ctrl+Shift+C</span>
          </label>
        </div>
      </div>
      <button id="btn-start" class="btn btn-primary">Start Capturing</button>
      <button id="btn-logout" class="btn btn-link">Log out</button>
      <div id="select-error" class="error" hidden></div>
    </div>

    <!-- Capture Active Screen (status only — capture happens via page toolbar) -->
    <div id="screen-capture" class="screen" hidden>
      <div class="info">
        <span class="label">Demo:</span>
        <span id="capture-demo-name" class="value"></span>
      </div>
      <div class="info">
        <span class="label">Frames captured:</span>
        <span id="capture-frame-count" class="value">0</span>
      </div>
      <div id="capture-status" class="status" hidden></div>
      <button id="btn-finish" class="btn btn-primary">Finish &amp; Open Builder</button>
      <button id="btn-back" class="btn btn-link">Stop &amp; back to demo list</button>
    </div>
  </div>

  <script src="dist/popup.js"></script>
</body>
</html>
